services:
  app:
    build:
      context: .
      target: runtime
    container_name: laravel_app
    restart: unless-stopped
    ports:
      - "8780:80"
    env_file:
      - .env.docker
    depends_on:
      db:
        condition: service_healthy
      mailpit:
        condition: service_started
    networks:
      - homework_network

  db:
    image: mysql:8.4
    container_name: laravel_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: app
      MYSQL_USER: app
      MYSQL_PASSWORD: app
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - homework_network

  mailpit:
    image: axllent/mailpit:latest
    container_name: laravel_mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - homework_network

networks:
  homework_network:
    driver: bridge

volumes:
  db_data:
